<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>GrandTheftNews logo</title>
<desc>GrandTheftNews wordmark with a circular GTN chrome emblem in a Miami neon palette.</desc>
<defs>
<linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#cffaff"/>
<stop offset="46%" stop-color="#2ad3e8"/>
<stop offset="100%" stop-color="#0a7d99"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="900" height="380" rx="22" fill="#120a24"/>

<g transform="translate(200,190)">
<circle r="118" fill="#1a0f30"/>
<circle r="118" fill="none" stroke="#00e0f0" stroke-width="5"/>
<circle r="104" fill="none" stroke="#ff3d8b" stroke-width="3"/>
<text y="34" text-anchor="middle" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="98px" fill="url(#chrome)" letter-spacing="-5">GTN</text>
<text y="74" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="15px" fill="#ff8ac0" letter-spacing="6">VICE CITY</text>
</g>

<g transform="translate(360,0)">
<text x="0" y="148" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="62px" fill="#ffffff" letter-spacing="-2">GRAND</text>
<text x="0" y="214" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="62px" fill="#ffffff" letter-spacing="-2">THEFT</text>
<text x="0" y="280" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="62px" fill="#00e0f0" letter-spacing="-2">NEWS</text>
<rect x="4" y="300" width="404" height="7" fill="#ff3d8b"/>
<text x="6" y="338" font-family="'Courier New',monospace" font-weight="700" font-size="17px" fill="#9a86c8" letter-spacing="5">THE VICE CITY DISPATCH</text>
</g>
</svg>
