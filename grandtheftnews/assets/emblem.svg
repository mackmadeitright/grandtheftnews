<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
<title>GTN emblem</title>
<desc>Circular GTN chrome monogram emblem in a Miami neon palette, for use as a favicon or avatar.</desc>
<defs>
<linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#cffaff"/>
<stop offset="46%" stop-color="#2ad3e8"/>
<stop offset="100%" stop-color="#0a7d99"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="512" height="512" rx="96" fill="#120a24"/>
<circle cx="256" cy="256" r="196" fill="#1a0f30"/>
<circle cx="256" cy="256" r="196" fill="none" stroke="#00e0f0" stroke-width="11"/>
<circle cx="256" cy="256" r="172" fill="none" stroke="#ff3d8b" stroke-width="6"/>
<text x="256" y="300" text-anchor="middle" font-family="'Arial Black','Helvetica',sans-serif" font-weight="900" font-size="176px" fill="url(#chrome)" letter-spacing="-9">GTN</text>
</svg>
