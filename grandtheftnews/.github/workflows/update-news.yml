name: Update GTA 6 News

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest GTA 6 news
        run: node grandtheftnews/scripts/fetch-news.js

      - name: Commit if changed
        run: |
          git config user.name "grandtheftnews-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain grandtheftnews/assets/news.json)" ]; then
            git add grandtheftnews/assets/news.json
            git commit -m "Auto-update GTA 6 news"
            git push
          else
            echo "No changes."
          fi
