name: Update GTA 6 News
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node grandtheftnews/scripts/fetch-news.js
      - run: |
          git config user.name "gtn-bot"
          git config user.email "actions@github.com"
          git add grandtheftnews/assets/news.json
          git diff --cached --quiet || git commit -m "Auto-update GTA 6 news"
          git push
